version: '3.8'
services:
  db:
    image: postgres:latest
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: registropvem
    ports:
      - "5432:5432"
    volumes:
      # Cambiamos el destino a la carpeta raíz de postgres en el contenedor
      - ./postgres_data:/var/lib/postgresql